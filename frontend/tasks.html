

<body>
    <main class="row">
      <section class="card w-2-3">
        <h2>Мои задачи</h2>
        <table class="table">
          <thead>
            <tr>
              <th>#</th><th>Заголовок</th><th>Исполнитель</th><th>Статус</th><th>Компания</th><th>Обновлено</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Сверстать список задач</td>
              <td>Вы</td>
              <td><span class="badge">new</span></td>
              <td>—</td>
              <td>сегодня</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Добавить таблицу</td>
              <td>Acme → Dev One</td>
              <td><span class="badge in_progress">in_progress</span></td>
              <td>Acme</td>
              <td>вчера</td>
            </tr>
            <tr>
              <td>3</td>
              <td>Исправить стили</td>
              <td>Вы</td>
              <td><span class="badge done">done</span></td>
              <td>—</td>
              <td>3 дн. назад</td>
            </tr>
          </tbody>
        </table>
      </section>

      <aside class="card w-1-3">
        <h2>Создать задачу</h2>
        <form>
          <div class="form-row">
            <label>Заголовок</label>
            <input type="text" placeholder="Короткое описание" />
          </div>
          <div class="form-row">
            <label>Описание</label>
            <textarea rows="4" placeholder="Детали задачи..."></textarea>
          </div>
          <div class="form-row split">
            <div class="half">
              <label>Компания</label>
              <select>
                <option>Личная</option>
                <option>Acme</option>
              </select>
            </div>
            <div class="half">
              <label>Исполнитель</label>
              <select>
                <option>Вы</option>
                <option>Dev One</option>
              </select>
            </div>
          </div>
          <div class="form-row inline">
            <button class="btn" type="button">Создать</button>
            <button class="btn secondary" type="button">Сброс</button>
          </div>
        </form>
      </aside>
    </main>
  </div>
</body>
