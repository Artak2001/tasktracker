  <body>
    <main class="row">
      <section class="card w-1-2">
        <h2>Сотрудники</h2>
        <table class="table">
          <thead>
            <tr><th>Имя</th><th>Email</th><th>Роль</th></tr>
          </thead>
          <tbody>
            <tr><td>Demo Admin</td><td>admin@demo.io</td><td><span class="badge">admin</span></td></tr>
            <tr><td>Dev One</td><td>dev1@demo.io</td><td><span class="badge">developer</span></td></tr>
          </tbody>
        </table>
      </section>

      <section class="card w-1-2">
        <h2>Пригласить пользователя</h2>
        <form>
          <div class="form-row split">
            <div class="half">
              <label>Email</label>
              <input type="email" placeholder="user@example.com" />
            </div>
            <div class="half">
              <label>Роль</label>
              <select>
                <option>manager</option>
                <option>developer</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <button class="btn" type="button">Отправить приглашение</button>
          </div>
        </form>
      </section>

      <section class="card w-full">
        <h2>Задачи компании</h2>
        <table class="table">
          <thead>
            <tr><th>#</th><th>Заголовок</th><th>Исполнитель</th><th>Статус</th></tr>
          </thead>
          <tbody>
            <tr><td>12</td><td>Сделать API для задач</td><td>Dev One</td><td><span class="badge in_progress">in_progress</span></td></tr>
            <tr><td>14</td><td>Настроить деплой</td><td>Demo Admin</td><td><span class="badge">new</span></td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
